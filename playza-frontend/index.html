<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Google Search Console Verification ───────────────────────────────── -->
    <meta name="google-site-verification" content="MNazmjfdjCCnYGXyiBNShC82d6tTM_Ng96f4051pQFE" />

    <!-- ─── Primary SEO ──────────────────────────────────────────────────────── -->
    <title>Playza – Play Games, Win Real Money</title>
    <meta name="description" content="Playza is The #1 competitive skill gaming platform. Play skill-based games, join tournaments, challenge friends in H2H matches, and win real money." />
    <meta name="keywords" content="playza, play games online, win real money online, skill games, H2H games, online tournaments, leaderboard games, competitive gaming" />
    <meta name="author" content="Playza" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://playza.games/" />

    <!-- ─── Open Graph ───────────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Playza" />
    <meta property="og:url" content="https://playza.games/" />
    <meta property="og:title" content="Playza – Play Games, Win Real Money" />
    <meta property="og:description" content="The #1 competitive skill gaming platform. Play skill-based games, join tournaments, and win real money." />
    <meta property="og:image" content="https://playza.games/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en" />

    <!-- ─── Twitter Card ─────────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@playzadotgames" />
    <meta name="twitter:title" content="Playza – Play Games, Win Real Money" />
    <meta name="twitter:description" content="The #1 competitive skill gaming platform. Play skill-based games, join tournaments, and win real money." />
    <meta name="twitter:image" content="https://playza.games/logo.png" />

    <!-- ─── DNS prefetch for API & Supabase (reduces connection time) ────────── -->
    <link rel="dns-prefetch" href="https://api.playza.games" />
    <link rel="preconnect" href="https://api.playza.games" crossorigin />
    <link rel="dns-prefetch" href="https://vfqozrzcwrlukjkvbijl.supabase.co" />
    <link rel="preconnect" href="https://vfqozrzcwrlukjkvbijl.supabase.co" crossorigin />

    <!-- ─── Fonts — non-blocking ─────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
    </noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=add_circle,arrow_forward,bolt,chess,chess_bishop,chess_knight,chess_pawn,expand_more,flash_on,groups,history,hourglass_empty,info,logout,rebase_edit,search,settings,stars,swords,sync,timer,trending_up,wifi&display=block"
      media="print"
      onload="this.media='all'"
    />

    <!-- ─── Favicon ──────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <meta name="msapplication-TileImage" content="/logo.png" />
    <meta name="msapplication-TileColor" content="#0a0712" />
    <meta name="theme-color" content="#0a0712" />

    <!-- ─── Keep Render backend awake (pings every 10 min) ──────────────────── -->
    <script>
      (function() {
        var PING_URL = 'https://api.playza.games/api/health'; // matches /api/health backend endpoint
        var INTERVAL = 10 * 60 * 1000;
        function ping() {
          fetch(PING_URL, { method: 'GET', mode: 'no-cors' }).catch(function(){});
        }
        ping();
        setInterval(ping, INTERVAL);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
