<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Path Navigation</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  
  <div class="shell">
    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay: HUD -->
    <div id="gameHud" class="hidden">
      <div class="hud-box" id="hudTimerBox">
        <span class="hud-label">TIME ALIVE</span>
        <span class="hud-value" id="hudTimer">0.0s</span>
      </div>
      <div class="hud-box">
        <span class="hud-label">VELOCITY</span>
        <span class="hud-value" id="hudSpeed">1.0x</span>
      </div>
    </div>

    <!-- UI Overlay: Start -->
    <div id="overlayStart" class="overlay">
      <div class="panel">
        <h1 class="glitch-text" data-text="PATH NAV">PATH NAV</h1>
        <p class="subtitle">SURVIVAL RUNNER</p>
        <p class="desc">Dodge the firewall obstacles. Survive 30 seconds to reach Escape Velocity (2.0x). Crashing zeros your stake.</p>
        
        <div class="controls-hint">
          <span>&larr; Left / Right &rarr;</span>
          <span>Tap Sides on Mobile</span>
        </div>

        <button id="btnStartGame" class="btn-primary">INITIATE RUN</button>
      </div>
    </div>

    <!-- UI Overlay: Result -->
    <div id="overlayResult" class="overlay hidden">
      <div class="panel result-panel">
        <h2 id="resTitle" class="res-title">SYSTEM FAILURE</h2>
        
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-label">TIME</span>
            <span class="stat-value" id="resTime">0.0s</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">TIER</span>
            <span class="stat-value" id="resTier">C</span>
          </div>
        </div>

        <div class="mult-display">
          <span class="mult-label">PAYOUT</span>
          <span class="mult-value" id="resMult">x0.0</span>
        </div>

        <p id="resKicker" class="kicker">Connection Terminated</p>

        <button id="btnPlayAgain" class="btn-primary">REBOOT</button>
      </div>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
