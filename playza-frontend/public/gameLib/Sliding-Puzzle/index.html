<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sliding Puzzle | Playza Arcade</title>
  <meta name="description" content="Classic 8-Puzzle sliding tile game. Rearrange the shuffled image tiles back to their correct positions. Play on Easy, Medium, or Hard mode." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ───────────── SCREEN: MENU ───────────── -->
  <div id="screen-menu" class="screen active">
    <div class="menu-bg-glow glow-1"></div>
    <div class="menu-bg-glow glow-2"></div>
    <div class="grid-overlay"></div>

    <div class="menu-content">
      <div class="logo-wrap">
        <div class="logo-badge">
          <span class="logo-p">P</span>
        </div>
        <div class="logo-text">
          <span class="logo-playza">PLAYZA</span>
          <span class="logo-arcade">ARCADE</span>
        </div>
      </div>

      <h1 class="game-title">SLIDING<br/><span class="accent">PUZZLE</span></h1>
      <p class="game-subtitle">Reassemble the image — one slide at a time.</p>

      <div class="menu-hero">
        <!-- Minimal, clean menu for Endless Arcade -->
      </div>

      <button class="btn-start" id="btn-start">
        <span>START ENDLESS RUN</span>
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <!-- ───────────── SCREEN: GAME ───────────── -->
  <div id="screen-game" class="screen">
    <!-- HUD -->
    <header class="game-hud" id="game-hud">
      <div class="hud-left">
        <button class="hud-btn" id="btn-back" title="Back to Menu">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M16 10H4M4 10l5-5M4 10l5 5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="hud-badge" id="hud-difficulty">EASY</div>
      </div>
      <div class="hud-center">
        <div class="hud-stat">
          <span class="hud-stat-value" id="stat-level">1</span>
          <span class="hud-stat-label">LEVEL</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-stat">
          <span class="hud-stat-value" id="stat-time">01:00</span>
          <span class="hud-stat-label">TIME</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-stat">
          <span class="hud-stat-value" id="stat-score">0</span>
          <span class="hud-stat-label">SCORE</span>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-stat">
          <span class="hud-stat-value" id="stat-combo" style="color: var(--accent);">x1</span>
          <span class="hud-stat-label">COMBO</span>
        </div>
      </div>
      <div class="hud-right">
        <button class="hud-btn accent-btn" id="btn-restart" title="Restart">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3.5 10A6.5 6.5 0 0 1 14.6 5.2M3.5 10l-2-2.5L4 5M16.5 10A6.5 6.5 0 0 1 5.4 14.8M16.5 10l2 2.5L16 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <!-- Puzzle Board & Preview -->
    <main class="game-main">
      <div class="game-content-wrap">
        <div class="puzzle-wrapper">
          <div class="puzzle-board" id="puzzle-board"></div>
        </div>
        
        <!-- Target Image Thumbnail -->
        <div class="target-preview-box">
          <div class="target-label">TARGET</div>
          <img id="target-thumbnail" src="" alt="Target Image" />
        </div>
      </div>
    </main>

    <!-- Study Phase Overlay -->
    <div class="preview-overlay" id="preview-overlay">
      <div class="preview-content">
        <h2 style="color: white; font-family: var(--font-head);">STUDY PHASE</h2>
        <img id="preview-img" src="" alt="Target Image" />
        <p>MEMORIZE IMAGE (<span id="study-timer">10</span>s)</p>
        <button class="btn-start" id="btn-skip-study" style="margin-top: 10px; padding: 12px 20px; font-size: 14px;">SKIP & START</button>
      </div>
    </div>
  </div>

  <!-- ───────────── SCREEN: WIN ───────────── -->
  <div id="screen-win" class="screen">
    <div class="win-bg-glow"></div>
    <canvas id="confetti-canvas"></canvas>
    <div class="win-content">
      <div class="win-trophy">🏆</div>
      <h1 class="win-title">PUZZLE<br/><span class="accent">SOLVED!</span></h1>
      <div class="win-stats">
        <div class="win-stat">
          <span class="win-stat-value" id="win-moves">-</span>
          <span class="win-stat-label">LEVEL REACHED</span>
        </div>
        <div class="win-stat">
          <span class="win-stat-value" id="win-time">-</span>
          <span class="win-stat-label">TIME</span>
        </div>
        <div class="win-stat">
          <span class="win-stat-value" id="win-score">-</span>
          <span class="win-stat-label">SCORE</span>
        </div>
      </div>
      <div class="win-rating" id="win-rating"></div>
      <div class="win-actions">
        <button class="btn-secondary" id="btn-play-again">PLAY AGAIN</button>
        <button class="btn-start" id="btn-menu">BACK TO MENU</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
