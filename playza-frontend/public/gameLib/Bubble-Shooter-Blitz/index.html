<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Shooter Blitz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>

    <!-- ── Outer shell: centres game column on wide screens ──────────── -->
    <div id="game-shell">

      <!-- ── Game container: max 480px, fills height ───────────────── -->
      <div id="game-container">

        <!-- ── HUD (absolutely positioned inside container) ─────────── -->
        <div id="hud">
          <div id="hud-left">
            <div class="hud-stat">
              <span class="hud-label">SCORE</span>
              <span class="hud-val" id="scoreValue">0</span>
            </div>
            <div class="hud-stat">
              <span class="hud-label">SHOTS</span>
              <span class="hud-val" id="shotsValue">150</span>
            </div>
            <div class="hud-stat">
              <span class="hud-label">COMBO</span>
              <span class="hud-val accent" id="comboValue">x1</span>
            </div>
          </div>
          <div id="hud-right">
            <div class="hud-stat">
              <span class="hud-label">LEVEL</span>
              <span class="hud-val" id="levelValue">1</span>
            </div>
            <button class="hud-btn" id="soundButton" type="button" aria-label="Toggle sound">🔊</button>
          </div>
        </div>

        <!-- ── Canvas fills the container ───────────────────────────── -->
        <canvas id="gameCanvas" aria-label="Bubble Shooter Blitz"></canvas>

        <!-- ── Bottom launcher bar ──────────────────────────────────── -->
        <div id="launcher-bar">
          <div id="queue-display">
            <div class="queue-slot" id="next-slot">
              <span class="queue-tag">NEXT</span>
              <div class="bubble-preview small" id="nextPreview"></div>
            </div>
            <div class="queue-slot now" id="now-slot">
              <span class="queue-tag">NOW</span>
              <div class="bubble-preview" id="nowPreview"></div>
            </div>
          </div>

          <div id="hud-mid">
            <span class="hud-label" id="messageLine">Tap to shoot</span>
          </div>

          <div id="swap-area">
            <button class="hud-btn" id="swapButton" type="button" title="Swap (S)">⇄ <span id="swapCount">2</span></button>
          </div>
        </div>

      </div><!-- /#game-container -->
    </div><!-- /#game-shell -->

    <!-- ── Hidden passthrough elements required by game.js ──────────── -->
    <span class="hidden" id="timeValue">60.0</span>
    <span class="hidden" id="bestValue">0</span>
    <span class="hidden" id="hintLine"></span>
    <span class="hidden" id="modePill"></span>
    <span class="hidden" id="seedPill"></span>
    <span class="hidden" id="bombButton"></span>
    <span class="hidden" id="bombCount">0</span>
    <span class="hidden" id="aimButton"></span>
    <span class="hidden" id="aimState">On</span>
    <span class="hidden" id="helpButton"></span>

    <!-- ── Game-over overlay ─────────────────────────────────────────── -->
    <div class="overlay hidden" id="overlay">
      <div class="modal">
        <p class="kicker" id="overlayKicker">Bubble Shooter Blitz</p>
        <h3 id="overlayTitle">Game Over</h3>
        <p class="copy" id="overlayText"></p>
        <div class="overlay-actions">
          <button class="primary" id="startDaily" type="button">Play Again</button>
          <button class="secondary hidden" id="startEndless" type="button"></button>
        </div>
        <div class="overlay-actions secondary-row">
          <button class="ghost" id="closeOverlay" type="button">Close</button>
        </div>
      </div>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
