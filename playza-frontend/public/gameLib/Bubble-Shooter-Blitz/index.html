<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Shooter Blitz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>

    <!-- ── Floating background bubbles (pure CSS, zero JS cost) ── -->
    <div id="bg-bubbles" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- ── Outer shell ───────────────────────────────────────────── -->
    <div id="game-shell">

      <!-- ── Game container ────────────────────────────────────── -->
      <div id="game-container">

        <!-- ── Top HUD ───────────────────────────────────────── -->
        <div id="hud">
          <div id="hud-left">
            <div class="hud-stat">
              <span class="hud-label">SCORE</span>
              <span class="hud-val" id="scoreValue">0</span>
            </div>
            <div class="hud-stat">
              <span class="hud-label">SHOTS</span>
              <span class="hud-val" id="shotsValue">150</span>
            </div>
            <div class="hud-stat">
              <span class="hud-label">COMBO</span>
              <span class="hud-val accent" id="comboValue">x1</span>
            </div>
          </div>
          <div id="hud-right">
            <div class="hud-stat">
              <span class="hud-label">LEVEL</span>
              <span class="hud-val" id="levelValue">1</span>
            </div>
            <button class="hud-btn" id="soundButton" type="button" aria-label="Toggle sound">🔊</button>
          </div>
        </div>

        <!-- ── Shot warning bar (fills every 8 shots before new row) ── -->
        <div id="shot-warning-bar">
          <div id="shot-warning-fill"></div>
          <span id="shot-warning-label">NEW ROW IN 2</span>
        </div>

        <!-- ── Canvas ────────────────────────────────────────── -->
        <canvas id="gameCanvas" aria-label="Bubble Shooter Blitz"></canvas>

        <!-- ── Milestone banner (mid-game celebration) ─────── -->
        <div id="milestone-banner" class="hidden" aria-live="polite"></div>

        <!-- ── Bottom launcher bar ───────────────────────────── -->
        <div id="launcher-bar">

          <!-- Hold slot -->
          <div id="hold-area" title="Hold bubble (H)">
            <span class="queue-tag">HOLD</span>
            <div id="holdPreview" class="bubble-preview hold-preview"></div>
            <span class="hold-key">H</span>
          </div>

          <!-- NOW + NEXT queue -->
          <div id="queue-display">
            <div class="queue-slot" id="next-slot">
              <span class="queue-tag">NEXT</span>
              <div class="bubble-preview small" id="nextPreview"></div>
            </div>
            <div class="queue-slot now" id="now-slot">
              <span class="queue-tag">NOW</span>
              <div class="bubble-preview" id="nowPreview"></div>
            </div>
          </div>

          <!-- Message line -->
          <div id="hud-mid">
            <span class="hud-label" id="messageLine">Tap to shoot</span>
          </div>

          <!-- Action buttons: AIM · SWAP · BOMB -->
          <div id="action-area">
            <button class="hud-btn action-btn" id="aimButton" type="button" title="Aim assist (A)">
              🎯 <span id="aimState">On</span>
            </button>
            <button class="hud-btn action-btn" id="swapButton" type="button" title="Swap (S)">
              ⇄ <span id="swapCount">2</span>
            </button>
            <button class="hud-btn action-btn bomb-btn" id="bombButton" type="button" title="Bomb (B)" disabled>
              💣 <span id="bombCount">0</span>
            </button>
          </div>

        </div><!-- /#launcher-bar -->

      </div><!-- /#game-container -->
    </div><!-- /#game-shell -->

    <!-- ── Hidden passthrough elements still required by game.js ── -->
    <span class="hidden" id="timeValue">60.0</span>
    <span class="hidden" id="bestValue">0</span>
    <span class="hidden" id="hintLine"></span>
    <span class="hidden" id="modePill"></span>
    <span class="hidden" id="seedPill"></span>
    <span class="hidden" id="helpButton"></span>

    <!-- ── Game-over overlay ─────────────────────────────────── -->
    <div class="overlay hidden" id="overlay">
      <div class="modal">
        <p class="kicker" id="overlayKicker">Bubble Shooter Blitz</p>
        <h3 id="overlayTitle">Game Over</h3>

        <!-- Animated stat card — populated by JS on endRun() -->
        <div id="stat-card" class="stat-card"></div>

        <!-- Legacy text fallback (hidden when stat card is used) -->
        <p class="copy hidden" id="overlayText"></p>

        <div class="overlay-actions">
          <button class="primary" id="startDaily" type="button">Play Again</button>
          <button class="secondary hidden" id="startEndless" type="button"></button>
        </div>
        <div class="overlay-actions secondary-row">
          <button class="ghost share-btn" id="shareButton" type="button">📤 Share</button>
          <button class="ghost" id="closeOverlay" type="button">Close</button>
        </div>
      </div>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
