<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Tetris - Matrix Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    
    <div class="game-container">
        <div class="game-wrapper">
            <div class="sidebar left-sidebar">
                <div class="logo">
                    <span class="logo-text">TETRIS</span>
                    <span class="logo-sub">NEON EDITION</span>
                </div>
                
                <div class="stats-panel">
                    <div class="stat-box score-box">
                        <div class="stat-label">SCORE</div>
                        <div class="stat-value" id="score">0</div>
                    </div>
                    
                    <div class="stat-box level-box">
                        <div class="stat-label">LEVEL</div>
                        <div class="stat-value" id="level">1</div>
                    </div>

                    <div class="stat-box lines-box">
                        <div class="stat-label">LINES</div>
                        <div class="stat-value" id="lines">0</div>
                    </div>
                </div>
            </div>
            
            <div class="game-main">
                <div class="game-header">
                    <span class="logo-mini">PLAYZA</span>
                    <div class="timer-box">
                        <span class="timer-label">TIME</span>
                        <span class="timer-value" id="timer">00:00</span>
                    </div>
                </div>
                
                <div class="stats-row">
                    <div class="stat-box score-box">
                        <div class="stat-label">SCORE</div>
                        <div class="stat-value" id="score-mobile">0</div>
                    </div>
                    
                    <div class="stat-box level-box">
                        <div class="stat-label">LEVEL</div>
                        <div class="stat-value" id="level-mobile">1</div>
                    </div>
                    
                    <div class="stat-box lines-box">
                        <div class="stat-label">LINES</div>
                        <div class="stat-value" id="lines-mobile">0</div>
                    </div>
                </div>
                
                <div class="canvas-wrapper">
                    <canvas id="game-canvas" width="300" height="600"></canvas>
                    <div class="combo-display" id="combo-display"></div>
                    <div class="game-overlay" id="overlay">
                        <div class="overlay-content">
                            <h2 class="overlay-title" id="overlay-title">READY?</h2>
                            <p class="overlay-subtitle">Press Start to Enter the Matrix</p>
                            <div class="game-stats" id="game-stats" style="display: none;">
                                <div class="game-stat-row">
                                    <span>FINAL SCORE</span>
                                    <span id="final-score">0</span>
                                </div>
                                <div class="game-stat-row">
                                    <span>LINES CLEARED</span>
                                    <span id="final-lines">0</span>
                                </div>
                                <div class="game-stat-row">
                                    <span>LEVEL REACHED</span>
                                    <span id="final-level">1</span>
                                </div>
                            </div>
                            <button class="start-btn" id="start-btn" onclick="playButtonClicked()">START MODULE</button>
                        </div>
                    </div>
                </div>
                
                <div class="touch-controls">
                    <div class="control-group movement">
                        <button class="touch-btn" id="btn-left">◀</button>
                        <button class="touch-btn" id="btn-down">▼</button>
                        <button class="touch-btn" id="btn-right">▶</button>
                    </div>
                    <div class="control-group actions">
                        <button class="touch-btn action" id="btn-rotate">↻</button>
                        <button class="touch-btn action drop" id="btn-drop">DROP</button>
                    </div>
                </div>
            </div>
            
            <div class="sidebar right-sidebar side-panels">
                <div class="highscore-panel">
                    <div class="panel-title">TOP RECORD</div>
                    <div class="highscore-value" id="highscore">0</div>
                </div>
                
                <div class="preview-panel">
                    <div class="panel-title">NEXT MODULE</div>
                    <canvas id="next-canvas" width="80" height="80"></canvas>
                </div>
                
                <div class="hold-panel">
                    <div class="panel-title">HELD DATA</div>
                    <canvas id="hold-canvas" width="80" height="80"></canvas>
                </div>
                
                <div class="sound-toggle">
                    <button class="sound-btn" id="sound-btn" onclick="toggleSound()">
                        <span class="sound-icon">🔊</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Rotate Overlay -->
    <div id="rotate-overlay">
        <div class="rotate-icon">📱</div>
        <p>PLEASE ROTATE YOUR DEVICE</p>
        <span>Landscape mode required for Matrix stability</span>
    </div>
    
    <audio id="clearsound" src="sound/pop.ogg" preload="auto"></audio>
    <script src="js/sdk.js"></script>
    <script src="js/tetris.js"></script>
    <script src="js/controller.js"></script>
    <script src="js/render.js"></script>
    <script src="js/matrix.js"></script>
</body>
</html>
