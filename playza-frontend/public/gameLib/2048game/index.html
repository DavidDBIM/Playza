<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - Premium Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="container" id="game-container">
            <div class="header">
                <div class="title-container">
                    <h1>2048</h1>
                    <p class="tagline">Merge to win</p>
                </div>
                <div class="scores-container">
                    <div class="score-box">
                        <span class="score-label">Score</span>
                        <span id="score" class="score-value">0</span>
                    </div>
                    <div class="score-box best">
                        <span class="score-label">Best</span>
                        <span id="best-score" class="score-value">0</span>
                    </div>
                </div>
            </div>

            <div class="controls">
                <p id="result-text">Join the numbers and reach the highest score!</p>
            </div>

            <div class="grid" id="grid">
                <!-- Tiles will be dynamically added here -->
                <div class="overlay" id="game-over-overlay">
                    <div class="popup">
                        <h2>GAME OVER</h2>
                        <div class="final-score-box">
                            <p>Final Score</p>
                            <span id="overlay-score">0</span>
                        </div>
                        <p style="color:var(--text-muted); font-size:11px; font-weight:bold; letter-spacing:1px; margin-top:5px; animation: pulse 1.5s infinite;">SYNCING LEADERBOARD...</p>
                    </div>
                </div>
            </div>

            <p class="mobile-hint">👆 Swipe to move tiles or use the D-Pad</p>
            <div id="mobile-dpad" class="mobile-dpad">
                <button class="dpad-btn up" onclick="window.tiltGrid('up')">▲</button>
                <div class="dpad-row">
                    <button class="dpad-btn left" onclick="window.tiltGrid('left')">◀</button>
                    <button class="dpad-btn down" onclick="window.tiltGrid('down')">▼</button>
                    <button class="dpad-btn right" onclick="window.tiltGrid('right')">▶</button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
