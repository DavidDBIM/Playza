<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - Arena Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="container" id="game-container">
            <div class="header">
                <div class="title-container">
                    <h1>2048</h1>
                    <p class="tagline">Merge to win</p>
                </div>
                <div class="scores-container">
                    <div class="score-box">
                        <span class="score-label">Score</span>
                        <span id="score" class="score-value">0</span>
                    </div>
                    <div class="score-box best">
                        <span class="score-label">Best</span>
                        <span id="best-score" class="score-value">0</span>
                    </div>
                    <div class="score-box moves">
                        <span class="score-label">Moves</span>
                        <span id="moves-display" class="score-value">0</span>
                    </div>
                </div>
            </div>

            <div class="controls">
                <p id="result-text">Join the numbers and reach the highest score!</p>
                <div class="ctrl-btns">
                    <button class="ctrl-btn" id="theme-btn" onclick="cycleTheme()" title="Change tile skin">🎨</button>
                    <button class="ctrl-btn" id="mute-btn" onclick="toggleMute()" title="Toggle sound">🔊</button>
                </div>
            </div>

            <!-- Power-up bar -->
            <div class="powerup-bar">
                <button class="powerup-btn" onclick="usePowerUp('undo')" title="Undo last move (5 ZA)">
                    <span class="powerup-icon">↩</span>
                    <span class="powerup-label">Undo</span>
                    <span class="powerup-cost">5 ZA</span>
                </button>
                <button class="powerup-btn smash" onclick="usePowerUp('smash')" title="Destroy a tile (10 ZA)">
                    <span class="powerup-icon">💥</span>
                    <span class="powerup-label">Smash</span>
                    <span class="powerup-cost">10 ZA</span>
                </button>
                <button class="powerup-btn gravity" onclick="usePowerUp('gravity')" title="Rotate board 90° (15 ZA)">
                    <span class="powerup-icon">🔄</span>
                    <span class="powerup-label">Gravity</span>
                    <span class="powerup-cost">15 ZA</span>
                </button>
            </div>

            <div class="grid" id="grid">
                <!-- Tiles will be dynamically added here -->
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
