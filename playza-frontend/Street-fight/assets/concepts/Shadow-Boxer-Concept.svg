<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" width="1600" height="800">
  <defs>
    <!-- Gradients for neon effects -->
    <radialGradient id="neonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hoodieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b8896a"/>
    </linearGradient>
    <linearGradient id="gloveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <filter id="neonFilter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="800" fill="url(#bgGrad)"/>
  
  <!-- Ground reflection line -->
  <rect x="0" y="680" width="1600" height="2" fill="#00d4ff" opacity="0.3"/>
  
  <!-- TITLE -->
  <text x="800" y="50" text-anchor="middle" fill="#00d4ff" font-size="36" font-family="Arial, sans-serif" filter="url(#neonFilter)" font-weight="bold">SHADOW BOXER - CONCEPT ART</text>
  <text x="400" y="85" text-anchor="middle" fill="#888" font-size="18" font-family="Arial, sans-serif">Front View</text>
  <text x="1200" y="85" text-anchor="middle" fill="#888" font-size="18" font-family="Arial, sans-serif">Back View</text>
  
  <!-- ==================== FRONT VIEW (x=400) ==================== -->
  <g transform="translate(0, 10)">
    <!-- Shadow on ground -->
    <ellipse cx="400" cy="660" rx="120" ry="20" fill="#000" opacity="0.4"/>
    
    <!-- Shoes (front view) -->
    <!-- Left shoe -->
    <path d="M 335 580 L 325 620 L 365 625 L 385 580" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="2"/>
    <path d="M 325 620 L 365 625 L 360 630 L 330 625 Z" fill="#2a2a2a"/>
    <line x1="330" y1="610" x2="360" y2="615" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Right shoe -->
    <path d="M 465 580 L 475 620 L 435 625 L 415 580" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="2"/>
    <path d="M 475 620 L 435 625 L 440 630 L 470 625 Z" fill="#2a2a2a"/>
    <line x1="470" y1="610" x2="440" y2="615" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Legs -->
    <path d="M 360 450 L 340 580 L 350 585 L 380 450" fill="#111122" stroke="#222" stroke-width="2"/>
    <path d="M 440 450 L 460 580 L 450 585 L 420 450" fill="#111122" stroke="#222" stroke-width="2"/>
    
    <!-- Torso -->
    <path d="M 340 250 Q 400 240 460 250 L 450 380 L 350 380 Z" fill="url(#hoodieGrad)" stroke="#2a2a3e" stroke-width="2"/>
    
    <!-- Hoodie details -->
    <path d="M 340 280 Q 400 290 460 280" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M 400 250 L 400 380" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="10,5"/>
    
    <!-- Chest muscle definition -->
    <path d="M 360 280 Q 380 305 395 280" stroke="#c9a87c" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 440 280 Q 420 305 405 280" stroke="#c9a87c" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 375 300 Q 400 320 425 300" stroke="#b8896a" stroke-width="2" fill="none" opacity="0.3"/>
    
    <!-- Arms -->
    <!-- Left arm (bent up) -->
    <path d="M 340 260 Q 280 280 260 320 Q 245 360 250 380" stroke="url(#skinGrad)" stroke-width="22" fill="none"/>
    <path d="M 250 380 Q 230 400 210 410" stroke="url(#gloveGrad)" stroke-width="20" fill="none"/>
    
    <!-- Right arm (bent up) -->
    <path d="M 460 260 Q 520 280 540 320 Q 555 360 550 380" stroke="url(#skinGrad)" stroke-width="22" fill="none"/>
    <path d="M 550 380 Q 570 400 590 410" stroke="url(#gloveGrad)" stroke-width="20" fill="none"/>
    
    <!-- Gloves (front view) -->
    <!-- Left glove -->
    <ellipse cx="210" cy="405" rx="18" ry="15" fill="url(#gloveGrad)" stroke="#333" stroke-width="2"/>
    <ellipse cx="210" cy="405" rx="18" ry="15" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- Right glove -->
    <ellipse cx="590" cy="405" rx="18" ry="15" fill="url(#gloveGrad)" stroke="#333" stroke-width="2"/>
    <ellipse cx="590" cy="405" rx="18" ry="15" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.6"/>
    
    <!-- Glove wraps/fingerless detail -->
    <rect x="195" y="395" width="30" height="10" rx="2" fill="#00d4ff" opacity="0.4"/>
    <rect x="575" y="395" width="30" height="10" rx="2" fill="#00d4ff" opacity="0.4"/>
    
    <!-- Hood (up) -->
    <path d="M 360 190 Q 360 150 400 140 Q 440 150 440 190 L 430 220 Q 400 230 370 220 Z" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="2"/>
    
    <!-- Head -->
    <ellipse cx="400" cy="180" rx="50" ry="65" fill="url(#skinGrad)" stroke="#c9a87c" stroke-width="2"/>
    
    <!-- Face features -->
    <ellipse cx="380" cy="170" rx="5" ry="4" fill="#1a1a1a"/>
    <ellipse cx="420" cy="170" rx="5" ry="4" fill="#1a1a1a"/>
    
    <!-- Eyebrows (strong, confident expression) -->
    <path d="M 375 155 L 385 162" stroke="#1a1a1a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 425 155 L 415 162" stroke="#1a1a1a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    
    <!-- Serious mouth (slight smirk) -->
    <path d="M 385 195 Q 400 202 415 195" stroke="#8b6b4a" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Chin definition -->
    <path d="M 400 195 L 400 210" stroke="#b8896a" stroke-width="1" opacity="0.4"/>
    
    <!-- Hair (visible at front of hood) -->
    <path d="M 370 135 Q 370 125 400 120 Q 430 125 430 135" stroke="#1a1a1a" stroke-width="4" fill="none"/>
    <path d="M 365 140 Q 365 120 400 110 Q 435 120 435 140" stroke="#1a1a1a" stroke-width="3" fill="none"/>
    
    <!-- Neck -->
    <rect x="385" y="220" width="30" height="40" rx="5" fill="url(#skinGrad)" stroke="#c9a87c" stroke-width="1"/>
    
    <!-- Neon accents on hoodie -->
    <path d="M 340 260 L 340 380" stroke="#00d4ff" stroke-width="3" fill="none" opacity="0.7" filter="url(#neonFilter)"/>
    <path d="M 460 260 L 460 380" stroke="#00d4ff" stroke-width="3" fill="none" opacity="0.7" filter="url(#neonFilter)"/>
    
    <!-- Logo on chest -->
    <text x="400" y="310" text-anchor="middle" fill="#00d4ff" font-size="16" font-family="Arial, sans-serif" font-weight="bold" opacity="0.8" filter="url(#neonFilter)">SF</text>
    
    <!-- Shoulder caps -->
    <ellipse cx="335" cy="265" rx="25" ry="12" fill="url(#hoodieGrad)" stroke="#2a2a3e" stroke-width="2"/>
    <ellipse cx="465" cy="265" rx="25" ry="12" fill="url(#hoodieGrad)" stroke="#2a2a3e" stroke-width="2"/>
    
    <!-- Hoodie string tips (neon) -->
    <circle cx="390" cy="230" r="4" fill="#00d4ff" filter="url(#neonFilter)"/>
    <circle cx="410" cy="230" r="4" fill="#00d4ff" filter="url(#neonFilter)"/>
  </g>
  
  <!-- ==================== BACK VIEW (x=1200) ==================== -->
  <g transform="translate(0, 10)">
    <!-- Shadow on ground -->
    <ellipse cx="1200" cy="660" rx="120" ry="20" fill="#000" opacity="0.4"/>
    
    <!-- Shoes (back view) -->
    <!-- Left shoe (from behind - left side of character) -->
    <path d="M 1165 580 L 1155 620 L 1190 623 L 1200 580" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="2"/>
    <path d="M 1155 620 L 1190 623 L 1185 628 L 1160 625 Z" fill="#2a2a2a"/>
    <line x1="1165" y1="608" x2="1185" y2="612" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Right shoe (from behind - right side of character) -->
    <path d="M 1240 580 L 1245 615 L 1210 620 L 1200 580" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="2"/>
    <path d="M 1245 615 L 1210 620 L 1215 625 L 1240 622 Z" fill="#2a2a2a"/>
    <line x1="1235" y1="608" x2="1215" y2="612" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Legs (back view) -->
    <path d="M 1170 450 L 1155 580 L 1165 585 L 1185 450" fill="#111122" stroke="#222" stroke-width="2"/>
    <path d="M 1230 450 L 1245 580 L 1235 585 L 1215 450" fill="#111122" stroke="#222" stroke-width="2"/>
    
    <!-- Torso (back view) -->
    <path d="M 1175 260 Q 1175 300 1178 380 L 1222 380 Q 1225 300 1225 260 Z" fill="url(#hoodieGrad)" stroke="#2a2a3e" stroke-width="2"/>
    
    <!-- Back muscles (latissimus dorsi) -->
    <path d="M 1175 300 Q 1160 340 1175 370" stroke="#b8896a" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 1225 300 Q 1240 340 1225 370" stroke="#b8896a" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 1190 310 Q 1200 340 1190 360" stroke="#b8896a" stroke-width="2" fill="none" opacity="0.3"/>
    
    <!-- Spine definition -->
    <line x1="1200" y1="270" x2="1200" y2="360" stroke="#0a0a0a" stroke-width="1" opacity="0.4"/>
    
    <!-- Arms (back view) -->
    <!-- Left arm (from behind - characters right arm) -->
    <path d="M 1225 260 Q 1260 290 1275 330 Q 1280 360 1270 390" stroke="url(#skinGrad)" stroke-width="22" fill="none"/>
    <path d="M 1270 390 Q 1280 405 1270 420" stroke="url(#gloveGrad)" stroke-width="20" fill="none"/>
    
    <!-- Right arm (from behind - character's left arm) -->
    <path d="M 1175 250 Q 1140 280 1120 320 Q 1115 350 1125 380" stroke="url(#skinGrad)" stroke-width="22" fill="none"/>
    <path d="M 1125 380 Q 1115 400 1125 415" stroke="url(#gloveGrad)" stroke-width="20" fill="none"/>
    
    <!-- Gloves (back view) -->
    <!-- Left glove (character's right) -->
    <ellipse cx="1270" cy="415" rx="17" ry="14" fill="url(#gloveGrad)" stroke="#333" stroke-width="2"/>
    <ellipse cx="1270" cy="415" rx="17" ry="14" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.6"/>
    
    <!-- Right glove (character's left) -->
    <ellipse cx="1125" cy="405" rx="17" ry="14" fill="url(#gloveGrad)" stroke="#333" stroke-width="2"/>
    <ellipse cx="1125" cy="405" rx="17" ry="14" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.6"/>
    
    <!-- Hood (down - showing back of hood and hair) -->
    <path d="M 1175 160 Q 1165 130 1190 110 Q 1210 125 1215 170 L 1210 200 Q 1200 210 1195 200 Z" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="2"/>
    
    <!-- Head (back view) -->
    <ellipse cx="1200" cy="170" rx="55" ry="70" fill="url(#skinGrad)" stroke="#c9a87c" stroke-width="2"/>
    
    <!-- Ears (visible from back) -->
    <ellipse cx="1145" cy="165" rx="8" ry="5" fill="url(#skinGrad)" stroke="#c9a87c" stroke-width="1"/>
    <ellipse cx="1255" cy="165" rx="8" ry="5" fill="url(#skinGrad)" stroke="#c9a87c" stroke-width="1"/>
    
    <!-- Hair (back view) -->
    <path d="M 1145 140 Q 1140 120 1170 100 Q 1200 90 1230 100 Q 1260 120 1255 140 Z" fill="#1a1a1a"/>
    <path d="M 1150 145 Q 1145 130 1175 115 Q 1205 105 1225 115 Q 1255 130 1250 145" stroke="#0a0a0a" stroke-width="2" fill="none"/>
    
    <!-- Ponytail/tying back hair -->
    <path d="M 1230 150 Q 1245 130 1255 110 Q 1260 90 1245 70" fill="none" stroke="#1a1a1a" stroke-width="8"/>
    <path d="M 1230 150 Q 1238 135 1245 115 Q 1250 100 1240 80" fill="none" stroke="#2a2a2a" stroke-width="4"/>
    
    <!-- Neck (back view) -->
    <rect x="1185" y="200" width="30" height="40" rx="5" fill="url(#skinGrad)" stroke="#c9a87c" stroke-width="1"/>
    
    <!-- Shoulder cap (back) -->
    <ellipse cx="1170" cy="255" rx="30" ry="14" fill="url(#hoodieGrad)" stroke="#2a2a3e" stroke-width="2"/>
    <ellipse cx="1225" cy="255" rx="30" ry="14" fill="url(#hoodieGrad)" stroke="#2a2a3e" stroke-width="2"/>
    
    <!-- Hoodie seam details (back) -->
    <path d="M 1175 260 L 1175 380" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M 1225 260 L 1225 380" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.5"/>
    
    <!-- Hoodie string (dangling at back) -->
    <path d="M 1200 195 L 1190 260" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.4"/>
    <circle cx="1190" cy="260" r="3" fill="#00d4ff" filter="url(#neonFilter)"/>
    <path d="M 1200 195 L 1210 260" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.4"/>
    <circle cx="1210" cy="260" r="3" fill="#00d4ff" filter="url(#neonFilter)"/>
    
    <!-- Optional: "SHADOW" text on back -->
    <text x="1200" y="340" text-anchor="middle" fill="#00d4ff" font-size="20" font-family="Arial, sans-serif" font-weight="bold" opacity="0.6" filter="url(#neonFilter)">SHADOW</text>
  </g>
  
  <!-- Neon light effects (overall) -->
  <circle cx="400" cy="300" r="180" fill="url(#neonGlow)" opacity="0.25"/>
  <circle cx="1200" cy="300" r="180" fill="url(#neonGlow)" opacity="0.25"/>
  
  <!-- Corner neon dots -->
  <g filter="url(#neonFilter)">
    <circle cx="30" cy="30" r="4" fill="#00d4ff"/>
    <circle cx="30" cy="45" r="3.5" fill="#00d4ff" opacity="0.7"/>
    <circle cx="30" cy="58" r="3" fill="#00d4ff" opacity="0.5"/>
    
    <circle cx="1570" cy="30" r="4" fill="#00d4ff"/>
    <circle cx="1570" cy="45" r="3.5" fill="#00d4ff" opacity="0.7"/>
    <circle cx="1570" cy="58" r="3" fill="#00d4ff" opacity="0.5"/>
  </g>
  
  <!-- Annotations -->
  <text x="400" y="760" text-anchor="middle" fill="#666" font-size="12" font-family="Arial, sans-serif">
    Front View - Full body concept | Semi-realistic | High-detail character design
  </text>
  <text x="1200" y="760" text-anchor="middle" fill="#666" font-size="12" font-family="Arial, sans-serif">
    Back View - Ponytail and hood back details | 3D modeling reference
  </text>
</svg>
